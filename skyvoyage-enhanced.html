        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #C5A059;
            --primary-dark: #A48446;
            --secondary: #10B981;
            --accent: #10B981;
            --dark: #000814;
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(5, 13, 28, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow-gold: 0 0 25px rgba(197, 160, 89, 0.25);
            --nav-height: 80px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(0, 8, 20, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--primary);
            font-size: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #000814 0%, #001d3d 50%, #000814 100%);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgb(197,160,89,0.1)"/><stop offset="100%" style="stop-color:rgb(197,160,89,0)"/></linearGradient></defs><path fill="url(%23grad1)" d="M0,540 Q480,360 960,540 T1920,540 L1920,1080 L0,1080 Z"/></svg>') no-repeat center;
            background-size: cover;
            opacity: 0.3;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: calc(var(--nav-height) + 4rem) 0 4rem;
        }

        /* Search Form */
        .search-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            margin: 4rem 0;
            box-shadow: var(--glow-gold);
        }

        .input-group { position: relative; }

        .input-label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .input-field { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 1.2rem; 
            border-radius: 16px; 
            width: 100%; 
            color: white; 
            font-weight: 700; 
            font-size: 1.15rem; 
            outline: none; 
            transition: border-color 0.3s; 
        }

        .input-field:focus { 
            border-color: var(--primary); 
            background: rgba(255,255,255,0.05); 
        }

        /* Enhanced Airport Dropdown */
        .airport-dropdown { 
            position: absolute; 
            top: 105%; 
            left: 0; 
            right: 0; 
            background: #081225; 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            max-height: 350px; 
            overflow-y: auto; 
            z-index: 2000; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            display: none; 
        }

        .airport-item { 
            padding: 1.2rem 1.5rem; 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .airport-item:hover { 
            background: rgba(197, 160, 89, 0.1); 
            padding-left: 2rem; 
        }

        .airport-item.selected {
            background: rgba(197, 160, 89, 0.2);
            border-left: 3px solid var(--primary);
        }

        .airport-info {
            flex: 1;
        }

        .airport-primary {
            font-weight: 900; 
            font-size: 1.1rem; 
            color: #fff; 
            margin-bottom: 0.2rem;
        }

        .airport-secondary {
            font-size: 0.75rem; 
            color: var(--text-muted); 
        }

        .airport-flag {
            font-size: 1.2rem;
            margin-left: 1rem;
        }

        .no-results {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        .highlight {
            background: rgba(197, 160, 89, 0.3);
            padding: 1px 2px;
            border-radius: 2px;
        }

        /* Buttons */
        .btn {
            padding: 1.2rem 2.5rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--dark);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(197, 160, 89, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .search-container {
                padding: 2rem 1.5rem;
                margin: 2rem 0;
            }

            .hero-content {
                padding: calc(var(--nav-height) + 2rem) 0 2rem;
            }

            .nav-links {
                display: none;
            }

            .container {
                padding: 0 15px;
            }
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Swap Button */
        .swap-btn {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }

        .swap-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-50%) rotate(180deg);
        }
    </style>
</head>

                        <button class="btn btn-secondary" onclick="clearForm()">

                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

            inputElement.addEventListener('focus', function() {
                showAllAirports(type);
                currentFocus = -1;
            });

            // Input event - filter with debouncing
            inputElement.addEventListener('input', function(e) {
                const value = this.value;
                
                // Clear existing debounce timer
                if (debounceTimer) {
                    clearTimeout(debounceTimer);
                }

                // Set new debounce timer (300ms)
                debounceTimer = setTimeout(() => {
                    filterAirports(type, value);
                }, 300);
            });

            // Keyboard navigation
            inputElement.addEventListener('keydown', function(e) {
                const dropdown = dropdownElement;
                const items = dropdown.getElementsByClassName('airport-item');

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    currentFocus++;
                    addActive(items, currentFocus, dropdownElement);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    currentFocus--;
                    addActive(items, currentFocus, dropdownElement);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (currentFocus > -1 && items[currentFocus]) {
                        items[currentFocus].click();
                    }
                } else if (e.key === 'Escape') {
                    hideDropdown(type);
                }
            });

            // Click outside to close
            document.addEventListener('click', function(e) {
                if (!inputElement.contains(e.target) && !dropdownElement.contains(e.target)) {
                    hideDropdown(type);
                }
            });
        }

        // Show all airports (when input is focused)
        function showAllAirports(type) {
            const dropdown = document.getElementById(`${type}-dropdown`);
            const limitedAirports = AIRPORTS.slice(0, 30); // Show first 30 for performance
            
            dropdown.innerHTML = limitedAirports.map(airport => 
                createAirportItem(airport, type, '')
            ).join('');
            
            dropdown.style.display = 'block';
        }

        // Filter airports based on search query
        function filterAirports(type, query) {
            const dropdown = document.getElementById(`${type}-dropdown`);
            
            if (!query.trim()) {
                showAllAirports(type);
                return;
            }

            const lowercaseQuery = query.toLowerCase();
            const filteredAirports = AIRPORTS.filter(airport => {
                return airport.city.toLowerCase().includes(lowercaseQuery) ||
                       airport.name.toLowerCase().includes(lowercaseQuery) ||
                       airport.iata.toLowerCase().includes(lowercaseQuery);
            }).slice(0, 25); // Limit to 25 results for performance

            if (filteredAirports.length === 0) {
                dropdown.innerHTML = '<div class="no-results">No airports found for "' + query + '"</div>';
            } else {
                dropdown.innerHTML = filteredAirports.map(airport => 
                    createAirportItem(airport, type, query)
                ).join('');
            }

            dropdown.style.display = 'block';
        }

        // Create airport item HTML with highlighting
        function createAirportItem(airport, type, query) {
            const highlightText = (text, query) => {
                if (!query) return text;
                const regex = new RegExp(`(${query})`, 'gi');
                return text.replace(regex, '<span class="highlight">$1</span>');
            };

            const highlightedCity = highlightText(airport.city, query);
            const highlightedName = highlightText(airport.name, query);
            const highlightedCode = highlightText(airport.iata, query);

            return `
                <div class="airport-item" onclick="selectAirport('${type}', '${airport.iata}', '${airport.city}')" data-code="${airport.iata}">
                    <div class="airport-info">
                        <div class="airport-primary">${highlightedCity} (${highlightedCode})</div>
                        <div class="airport-secondary">${highlightedName}</div>
                    </div>
                    <div class="airport-flag">${airport.flag}</div>
                </div>
            `;
        }

        // Add active class to highlighted item
        function addActive(items, index, dropdown) {
            if (!items) return;
            
            // Remove active class from all items
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove('selected');
            }
            
            if (index >= 0 && index < items.length) {
                items[index].classList.add('selected');
                // Scroll into view if needed
                items[index].scrollIntoView({ block: 'nearest' });
            }
        }

        // Select airport
        function selectAirport(type, code, city) {
            const input = document.getElementById(`${type}-input`);
            const dropdown = document.getElementById(`${type}-dropdown`);
            
            input.value = `${city} (${code})`;
            state[type] = code;
            state.selectedAirport[type] = { code, city };
            
            hideDropdown(type);
            
            // Validate that both airports are selected
            validateAirports();
        }

        // Hide dropdown
        function hideDropdown(type) {
            const dropdown = document.getElementById(`${type}-dropdown`);
            dropdown.style.display = 'none';
            state.currentFocus[type] = -1;
        }

        // Swap airports
        function swapAirports() {
            const fromInput = document.getElementById('from-input');
            const toInput = document.getElementById('to-input');
            
            const tempValue = fromInput.value;
            const tempState = state.from;
            const tempSelected = state.selectedAirport.from;
            
            fromInput.value = toInput.value;
            state.from = state.to;
            state.selectedAirport.from = state.selectedAirport.to;
            
            toInput.value = tempValue;
            state.to = tempState;
            state.selectedAirport.to = tempSelected;
            
            validateAirports();
        }

        // Validate airport selection
        function validateAirports() {
            const fromInput = document.getElementById('from-input');
            const toInput = document.getElementById('to-input');
            
            // Check if both airports are selected and different
            if (state.from && state.to && state.from === state.to) {
                toInput.value = '';
                state.to = null;
                state.selectedAirport.to = null;
                showNotification('Departure and destination airports must be different', 'error');
            }
        }

        // Clear form
        function clearForm() {
            document.getElementById('from-input').value = '';
            document.getElementById('to-input').value = '';
            document.getElementById('departure').value = '';
            document.getElementById('travelers').selectedIndex = 0;
            
            state.from = null;
            state.to = null;
            state.selectedAirport.from = null;
            state.selectedAirport.to = null;
            
            hideDropdown('from');
            hideDropdown('to');
        }

        // Search flights
        function searchFlights() {
            if (!state.from || !state.to) {
                showNotification('Please select both departure and destination airports', 'error');
                return;
            }

            const departureDate = document.getElementById('departure').value;
            if (!departureDate) {
                showNotification('Please select a travel date', 'error');
                return;
            }

            const today = new Date().toISOString().split('T')[0];
            if (departureDate < today) {
                showNotification('Travel date cannot be in the past', 'error');
                return;
            }

            const fromCity = state.selectedAirport.from.city;
            const toCity = state.selectedAirport.to.city;
            
            showNotification(`Searching flights from ${fromCity} to ${toCity}...`, 'success');
            
            // Here you would typically make an API call
            setTimeout(() => {
                showNotification(`Found 12 flights from ${fromCity} to ${toCity}`, 'success');
            }, 2000);
        }

        // Show notification
        function showNotification(message, type = 'info') {
            // Remove existing notification
            const existing = document.querySelector('.notification');
            if (existing) {
                existing.remove();
            }

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                color: white;
                font-weight: 600;
                z-index: 3000;
                animation: slideIn 0.3s ease;
                background: ${type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : '#3b82f6'};
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Initialize autocomplete on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize departure airport autocomplete
            initAirportAutocomplete(
                document.getElementById('from-input'),
                document.getElementById('from-dropdown'),
                'from'
            );

            // Initialize destination airport autocomplete
            initAirportAutocomplete(
                document.getElementById('to-input'),
                document.getElementById('to-dropdown'),
                'to'
            );

            // Set minimum date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('departure').setAttribute('min', today);

            console.log(`SkyVoyage initialized with ${AIRPORTS.length} airports`);
            console.log(`Indian airports: ${AIRPORTS.filter(a => a.country === 'India').length}`);
            console.log(`International airports: ${AIRPORTS.filter(a => a.country !== 'India').length}`);
        });

        // Add slide-in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
